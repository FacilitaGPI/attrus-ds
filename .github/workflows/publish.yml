name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @attrus-ds/core
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1. Node 22 ships an older npm
      # that can fail with misleading 404 even when OIDC/provenance is configured.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Prepare npm auth for OIDC
        run: |
          echo "npm version: $(npm --version)"
          # setup-node writes //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          # which blocks OIDC when NODE_AUTH_TOKEN is unset.
          npm config delete //registry.npmjs.org/:_authToken --location=user || true

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build package
        run: npm run build

      - name: Check version is not already published
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@attrus-ds/core@$PKG_VERSION" version 2>/dev/null; then
            echo "Version $PKG_VERSION is already on npm. Bump package.json before publishing."
            exit 1
          fi
          echo "Version $PKG_VERSION is available to publish."

      - name: Publish to npm
        run: npm publish --provenance --access public
